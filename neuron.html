<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>神经元模拟器</title>
  <style>
    :root {
      --bg-start: #f2f2f7;
      --bg-end: #e5e7eb;
      --card: rgba(255, 255, 255, 0.75);
      --text-main: #1d1d1f;
      --text-sub: #6e6e73;
      --accent: #0071e3;
      --accent-hover: #0077ed;
      --border: rgba(0, 0, 0, 0.08);
      --shadow: 0 20px 45px rgba(0, 0, 0, 0.14);
      --radius-xl: 24px;
      --radius-md: 12px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", sans-serif;
      color: var(--text-main);
      transition: background 0.5s ease;
      background: radial-gradient(circle at 20% 20%, #ffffff 0%, transparent 38%),
        linear-gradient(145deg, var(--bg-start), var(--bg-end));
    }

    body.high-activation {
      background: radial-gradient(circle at 20% 20%, #fff8d6 0%, transparent 38%),
        linear-gradient(145deg, #ffe08a, #ffc84d);
    }

    .card {
      width: min(760px, 100%);
      background: var(--card);
      border: 1px solid var(--border);
      backdrop-filter: blur(14px);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow);
      padding: 30px;
    }

    h1 {
      font-size: clamp(1.7rem, 2.2vw, 2.3rem);
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 6px;
    }

    .subtitle {
      color: var(--text-sub);
      margin-bottom: 24px；
      font-size: 0.98rem;
    }

    .grid {
      display: gr
      grid-template-columns: repeat(2, minmax(220px, 1fr));
      gap: 18px;
      margin-bottom: 22px;
    }

    @media (max-width: 640px) {
      .grid {
        grid-template-columns: 1fr;
      }
    }

    .group {
      background: rgba(255, 255, 255, 0.72);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 14px;
    }

    label {
      display: block;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .hint {
      display: block;
      margin-top: 6px;
      color: var(--text-sub);
      font-size: 0.85rem;
    }

    input[type="number"] {
      width: 100%;
      border: 1px solid #d2d2d7;
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    input[type="number"]:focus {
      border-color: rgba(0, 113, 227, 0.65);
      box-shadow: 0 0 0 4px rgba(0, 113, 227, 0.15);
    }

    .slider-wrap {
      display: grid;
      gap: 8px;
    }

    input[type="range"] {
      width: 100%;
      accent-color: var(--accent);
      cursor: pointer;
    }

    .weight-value {
      color: var(--text-sub);
      font-variant-numeric: tabular-nums;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 12px;
    }

    button {
      border: none;
      border-radius: 999px;
      background: var(--accent);
      color: #fff;
      padding: 11px 22px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.18s ease, background 0.18s ease, box-shadow 0.18s ease;
      box-shadow: 0 6px 16px rgba(0, 113, 227, 0.28);
    }

    button:hover {
      background: var(--accent-hover);
      transform: translateY(-1px);
    }

    button:active {
      transform: translateY(0);
    }

    .result {
      margin-left: auto;
      font-size: 1.03rem;
      color: var(--text-main);
      background: rgba(255, 255, 255, 0.9);
      border: 1px solid var(--border);
      padding: 10px 14px;
      border-radius: 12px;
      min-width: 250px;
      text-align: center;
    }

    .formula {
      margin-top: 18px;
      color: var(--text-sub);
      font-size: 0.92rem;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>神经元工作过程模拟</h1>
    <p class="subtitle">输入信号 x 与权重 w 相乘并相加：z = x1*w1 + x2*w2</p>

    <section class="grid">
      <div class="group">
        <label for="x1">输入信号 x1</label>
        <input id="x1" type="number" min="0" max="1" step="0.01" value="0.50" />
        <span class="hint">范围：0 ~ 1</span>
      </div>
      <div class="group">
        <label for="x2">输入信号 x2</label>
        <input id="x2" type="number" min="0" max="1" step="0.01" value="0.80" />
        <span class="hint">范围：0 ~ 1</span>
      </div>

      <div class="group slider-wrap">
        <label for="w1">权重 w1</label>
        <input id="w1" type="range" min="-2" max="2" step="0.01" value="0.75" />
        <span class="weight-value">当前值：<strong id="w1Value">0.75</strong></span>
      </div>
      <div class="group slider-wrap">
        <label for="w2">权重 w2</label>
        <input id="w2" type="range" min="-2" max="2" step="0.01" value="1.20" />
        <span class="weight-value">当前值：<strong id="w2Value">1.20</strong></span>
      </div>
    </section>

    <div class="actions">
      <button id="calcBtn" type="button">计算</button>
      <div class="result" id="resultBox">加权总和 z：--</div>
    </div>

    <p class="formula" id="detail">等待计算...</p>
  </main>

  <script>
    const x1Input = document.getElementById("x1");
    const x2Input = document.getElementById("x2");
    const w1Input = document.getElementById("w1");
    const w2Input = document.getElementById("w2");
    const w1Value = document.getElementById("w1Value");
    const w2Value = document.getElementById("w2Value");
    const resultBox = document.getElementById("resultBox");
    const detail = document.getElementById("detail");
    const calcBtn = document.getElementById("calcBtn");

    function formatNum(num) {
      return Number(num).toFixed(2);
    }

    function clampSignal(v) {
      if (Number.isNaN(v)) return null;
      if (v < 0) return 0;
      if (v > 1) return 1;
      return v;
    }

    function updateWeightLabels() {
      w1Value.textContent = formatNum(w1Input.value);
      w2Value.textContent = formatNum(w2Input.value);
    }

    function calculateNeuron() {
      const x1Raw = Number(x1Input.value);
      const x2Raw = Number(x2Input.value);
      const x1 = clampSignal(x1Raw);
      const x2 = clampSignal(x2Raw);

      if (x1 === null || x2 === null) {
        resultBox.textContent = "请输入有效数字";
        detail.textContent = "输入信号需要是 0 到 1 之间的数字。";
        return;
      }

      if (x1 !== x1Raw) x1Input.value = formatNum(x1);
      if (x2 !== x2Raw) x2Input.value = formatNum(x2);

      const w1 = Number(w1Input.value);
      const w2 = Number(w2Input.value);
      const sum = x1 * w1 + x2 * w2;

      resultBox.textContent = "加权总和 z：" + formatNum(sum);
      detail.textContent =
        "z = (" +
        formatNum(x1) +
        " * " +
        formatNum(w1) +
        ") + (" +
        formatNum(x2) +
        " * " +
        formatNum(w2) +
        ") = " +
        formatNum(sum);

      if (sum > 0.8) {
        document.body.classList.add("high-activation");
        alert("神经元高度激活！");
      } else {
        document.body.classList.remove("high-activation");
      }
    }

    w1Input.addEventListener("input", updateWeightLabels);
    w2Input.addEventListener("input", updateWeightLabels);
    calcBtn.addEventListener("click", calculateNeuron);

    updateWeightLabels();
  </script>
</body>
</html>
